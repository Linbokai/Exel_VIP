<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP客服日报系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #fff;
            --text: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --border: #e8e8e8;
            --primary: #2F5496;
            --primary-dark: #1a3a6e;
            --primary-light: #d6e4f0;
            --primary-bg: #f0f4fa;
            --success: #52c41a;
            --success-bg: #f6ffed;
            --warning: #faad14;
            --warning-bg: #fffbe6;
            --danger: #ff4d4f;
            --danger-bg: #fff2f0;
            --shadow: rgba(0,0,0,.08);
            --shadow-hover: rgba(0,0,0,.15);
        }
        [data-theme="dark"] {
            --bg: #141414;
            --card-bg: #1f1f1f;
            --text: #e8e8e8;
            --text-secondary: #b0b0b0;
            --text-muted: #777;
            --border: #333;
            --primary-light: #1a3a6e;
            --primary-bg: #111d2c;
            --success-bg: #162312;
            --warning-bg: #2b2111;
            --danger-bg: #2a1215;
            --shadow: rgba(0,0,0,.3);
            --shadow-hover: rgba(0,0,0,.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background .3s, color .3s;
        }

        .header {
            background: linear-gradient(135deg, #2F5496, #1a3a6e);
            color: #fff;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .subtitle { font-size: 12px; opacity: .75; margin-top: 2px; }
        .header-right { display: flex; align-items: center; gap: 12px; }

        .theme-toggle {
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.2);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background .2s;
        }
        .theme-toggle:hover { background: rgba(255,255,255,.25); }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 1px 4px var(--shadow);
            padding: 20px 24px;
            margin-bottom: 16px;
            transition: box-shadow .2s, background .3s;
        }
        .card:hover { box-shadow: 0 4px 12px var(--shadow-hover); }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--primary);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .controls label { font-size: 13px; color: var(--text-secondary); }
        .controls input[type="date"] {
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            background: var(--card-bg);
            color: var(--text);
            transition: border-color .2s;
        }
        .controls input[type="date"]:focus { border-color: var(--primary); }

        .btn {
            padding: 7px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all .2s;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { background: #a0b4d0; cursor: not-allowed; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { opacity: .9; }
        .btn-outline {
            background: var(--card-bg);
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-outline:hover { background: var(--primary-bg); }
        .btn-sm { padding: 4px 12px; font-size: 12px; }

        /* 统计概览 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 1px 4px var(--shadow);
            transition: transform .2s, box-shadow .2s, background .3s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px var(--shadow-hover); }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .stat-trend { font-size: 11px; margin-top: 4px; font-weight: 500; }
        .trend-up { color: var(--danger); }
        .trend-down { color: var(--success); }
        .trend-flat { color: var(--text-muted); }

        /* 图表 */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .chart-box {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 1px 4px var(--shadow);
            padding: 16px;
            min-height: 320px;
            transition: background .3s;
        }

        /* 板块折叠 */
        .section {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 1px 4px var(--shadow);
            margin-bottom: 12px;
            overflow: hidden;
            transition: background .3s;
        }
        .section-header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: background .2s;
        }
        .section-header:hover { background: var(--primary-bg); }
        .section-title { font-size: 14px; font-weight: 600; color: var(--primary); }
        .section-badge {
            background: var(--primary);
            color: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .section-badge.warning { background: var(--warning); }
        .section-badge.danger { background: var(--danger); }
        .section-arrow { transition: transform .2s; color: var(--text-muted); font-size: 12px; }
        .section.collapsed .section-arrow { transform: rotate(-90deg); }
        .section-body { padding: 0 20px 16px; overflow: hidden; transition: max-height .3s ease; }
        .section.collapsed .section-body { max-height: 0; padding: 0 20px; }

        /* 工单表格 */
        .ticket-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .ticket-table th {
            background: var(--primary);
            color: #fff;
            padding: 8px 10px;
            text-align: left;
            font-weight: 500;
        }
        .ticket-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        .ticket-table tr:hover td { background: var(--primary-bg); }
        .ticket-table .super-r { background: var(--danger-bg); }
        .ticket-table .unsolved { background: var(--warning-bg); }
        .status-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-tag.resolved { background: var(--success-bg); color: #389e0d; }
        .status-tag.pending { background: var(--warning-bg); color: #d48806; }

        .download-bar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

        .history-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .history-list { list-style: none; }
        .history-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .history-list li:last-child { border-bottom: none; }
        .history-date { color: var(--text-secondary); }
        .history-actions { display: flex; gap: 8px; }
        .history-actions a {
            color: var(--primary);
            text-decoration: none;
            font-size: 12px;
            padding: 2px 8px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            transition: all .2s;
        }
        .history-actions a:hover { background: var(--primary); color: #fff; }

        .loading { display: none; align-items: center; gap: 8px; color: var(--primary); font-size: 13px; }
        .loading.active { display: flex; }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; top: 16px; right: 16px;
            padding: 10px 18px; border-radius: 8px;
            color: #fff; font-size: 13px; z-index: 1000;
            transform: translateX(120%); transition: transform .3s;
            box-shadow: 0 4px 12px rgba(0,0,0,.2);
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--success); }

        .alert-bar {
            background: var(--danger-bg);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--danger);
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .header h1 { font-size: 16px; }
            .container { padding: 0 8px; margin: 12px auto; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-card { padding: 12px 8px; }
            .stat-value { font-size: 22px; }
            .charts-grid { grid-template-columns: 1fr; }
            .chart-box { min-height: 260px; }
            .controls { flex-direction: column; align-items: stretch; }
            .controls .btn { width: 100%; justify-content: center; }
            .ticket-table { font-size: 11px; }
            .ticket-table th, .ticket-table td { padding: 6px 4px; }
            .card { padding: 14px 12px; }
            .section-header { padding: 10px 14px; }
            .section-body { padding: 0 14px 12px; }
            .history-list li { flex-direction: column; gap: 6px; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>VIP客服日报系统</h1>
        <div class="subtitle">自动生成标准化客诉日报</div>
    </div>
    <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()">
            <span id="themeLabel">深色模式</span>
        </button>
    </div>
</div>

<div class="container">
    <!-- 操作卡片 -->
    <div class="card">
        <div class="card-title">生成日报</div>
        <div class="controls">
            <label>选择日期：</label>
            <input type="date" id="reportDate" value="{{ today }}">
            <button class="btn btn-primary" id="btnGenerate" onclick="generateReport()">生成日报</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>正在生成日报，请耐心等待...</span>
            </div>
        </div>
    </div>

    <!-- 错误提示 -->
    <div class="alert-bar hidden" id="alertBar"></div>

    <!-- 统计概览 -->
    <div class="stats-grid hidden" id="statsSection">
        <div class="stat-card">
            <div class="stat-value" id="statDaily">0</div>
            <div class="stat-label">当日工单数</div>
            <div class="stat-trend" id="trendDaily"></div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statPending">0</div>
            <div class="stat-label">待跟进工单</div>
            <div class="stat-trend" id="trendPending"></div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statSessions">0</div>
            <div class="stat-label">总会话量</div>
            <div class="stat-trend" id="trendSessions"></div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statSuperR">0</div>
            <div class="stat-label">超R工单</div>
            <div class="stat-trend" id="trendSuperR"></div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statChurn">0</div>
            <div class="stat-label">预流失</div>
            <div class="stat-trend" id="trendChurn"></div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statComplaint">0</div>
            <div class="stat-label">预投诉</div>
            <div class="stat-trend" id="trendComplaint"></div>
        </div>
    </div>

    <!-- 图表 -->
    <div class="charts-grid hidden" id="chartsSection">
        <div class="chart-box"><div id="chartPie" style="width:100%;height:300px;"></div></div>
        <div class="chart-box"><div id="chartBar" style="width:100%;height:300px;"></div></div>
    </div>

    <!-- 日报板块 -->
    <div id="sectionsContainer" class="hidden"></div>

    <!-- 下载区 -->
    <div class="card hidden" id="downloadSection">
        <div class="card-title">文件下载</div>
        <div class="download-bar" id="downloadBar"></div>
    </div>

    <!-- 历史记录 -->
    <div class="card">
        <div class="card-title">历史日报</div>
        <div class="history-controls">
            <label>从</label>
            <input type="date" id="historyStart">
            <label>到</label>
            <input type="date" id="historyEnd">
            <button class="btn btn-outline btn-sm" onclick="loadHistory()">筛选</button>
            <button class="btn btn-sm" style="background:var(--text-muted);color:#fff;" onclick="clearHistoryFilter()">重置</button>
        </div>
        <ul class="history-list" id="historyList">
            <li style="color:var(--text-muted);">加载中...</li>
        </ul>
        <div id="historyPagination" style="margin-top:12px;display:flex;gap:8px;justify-content:center;"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 主题切换 ==========
function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? '' : 'dark');
    document.getElementById('themeLabel').textContent = isDark ? '深色模式' : '浅色模式';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    if (window._pieChart) window._pieChart.resize();
    if (window._barChart) window._barChart.resize();
}
(function() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('themeLabel').textContent = '浅色模式';
    }
})();

// ========== 趋势标记 ==========
function trendMark(current, prev) {
    if (prev === undefined || prev === null) return '';
    const diff = current - prev;
    if (diff > 0) return '<span class="trend-up">+' + diff + '</span>';
    if (diff < 0) return '<span class="trend-down">' + diff + '</span>';
    return '<span class="trend-flat">持平</span>';
}

// ========== 生成日报 ==========
async function generateReport() {
    const dateInput = document.getElementById('reportDate');
    const btn = document.getElementById('btnGenerate');
    const loading = document.getElementById('loading');
    const date = dateInput.value;
    if (!date) { showToast('请选择日期', 'error'); return; }

    btn.disabled = true;
    loading.classList.add('active');
    hideAll();

    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 600000);
        const res = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date: date }),
            signal: controller.signal,
        });
        clearTimeout(timeoutId);
        const data = await res.json();
        if (!data.success) { showToast(data.error || '生成失败', 'error'); return; }

        if (data.errors && data.errors.length > 0) {
            const bar = document.getElementById('alertBar');
            bar.textContent = '数据获取不完整：' + data.errors.join('、') + '，日报可能缺少部分数据';
            bar.classList.remove('hidden');
        }

        renderStats(data);
        renderCharts(data);
        renderSections(data);
        renderDownloads(data);
        showToast('日报生成成功', 'success');
        loadHistory();
    } catch (e) {
        showToast('请求失败：' + e.message, 'error');
    } finally {
        btn.disabled = false;
        loading.classList.remove('active');
    }
}

function hideAll() {
    ['alertBar','statsSection','chartsSection','sectionsContainer','downloadSection'].forEach(function(id) {
        document.getElementById(id).classList.add('hidden');
    });
}

// ========== 统计卡片 ==========
function renderStats(data) {
    var s = data.stats || {};
    var t = data.trend || {};
    document.getElementById('statDaily').textContent = s.daily_count || 0;
    document.getElementById('statPending').textContent = s.pending_count || 0;
    document.getElementById('statSessions').textContent = s.total_sessions || 0;
    document.getElementById('statSuperR').textContent = s.super_r_count || 0;
    document.getElementById('statChurn').textContent = s.pre_churn_count || 0;
    document.getElementById('statComplaint').textContent = s.pre_complaint_count || 0;
    document.getElementById('trendDaily').innerHTML = trendMark(s.daily_count, t.prev_daily_count);
    document.getElementById('trendSessions').innerHTML = trendMark(s.total_sessions, t.prev_total_sessions);
    document.getElementById('trendSuperR').innerHTML = trendMark(s.super_r_count, t.prev_super_r_count);
    document.getElementById('trendChurn').innerHTML = trendMark(s.pre_churn_count, t.prev_pre_churn_count);
    document.getElementById('trendComplaint').innerHTML = trendMark(s.pre_complaint_count, t.prev_pre_complaint_count);
    document.getElementById('statsSection').classList.remove('hidden');
}

// ========== 图表 ==========
function renderCharts(data) {
    document.getElementById('chartsSection').classList.remove('hidden');
    var structured = data.structured || {};
    var catStats = structured.category_stats || [];
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var textColor = isDark ? '#ccc' : '#333';

    var pieEl = document.getElementById('chartPie');
    if (window._pieChart) window._pieChart.dispose();
    window._pieChart = echarts.init(pieEl);
    window._pieChart.setOption({
        title: { text: '问题类型分布', left: 'center', textStyle: { fontSize: 14, color: textColor } },
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { orient: 'vertical', left: 'left', top: 'middle', textStyle: { fontSize: 11, color: textColor } },
        series: [{
            type: 'pie', radius: ['35%', '65%'], center: ['60%', '55%'],
            avoidLabelOverlap: true,
            itemStyle: { borderRadius: 4, borderColor: isDark ? '#1f1f1f' : '#fff', borderWidth: 2 },
            label: { show: false },
            emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' } },
            data: catStats.map(function(c) { return { name: c.name, value: c.total }; }),
        }],
    });

    var barEl = document.getElementById('chartBar');
    if (window._barChart) window._barChart.dispose();
    window._barChart = echarts.init(barEl);
    window._barChart.setOption({
        title: { text: '处理方分布', left: 'center', textStyle: { fontSize: 14, color: textColor } },
        tooltip: { trigger: 'axis' },
        legend: { data: ['客服处理', '运营/研发介入'], bottom: 0, textStyle: { color: textColor } },
        grid: { left: '3%', right: '4%', bottom: '12%', top: '18%', containLabel: true },
        xAxis: { type: 'category', data: catStats.map(function(c) { return c.name; }), axisLabel: { rotate: 30, fontSize: 10, color: textColor } },
        yAxis: { type: 'value', axisLabel: { color: textColor } },
        series: [
            { name: '客服处理', type: 'bar', stack: 'total', data: catStats.map(function(c) { return c.agent; }), itemStyle: { color: '#2F5496' } },
            { name: '运营/研发介入', type: 'bar', stack: 'total', data: catStats.map(function(c) { return c.dev; }), itemStyle: { color: '#ff7875' } },
        ],
    });
}

// ========== 板块渲染 ==========
function renderSections(data) {
    var container = document.getElementById('sectionsContainer');
    var s = data.structured || {};
    var sections = s.sections || {};
    container.innerHTML = '';

    var defs = [
        { key: 'pending_dev', title: '二、待跟进问题总计（飞鱼科技）', showAmount: false, showStatus: false, badge: '' },
        { key: 'unvisited', title: '三、客服未回访/未跟进问题总计', showAmount: false, showStatus: false, badge: '' },
        { key: 'super_r', title: '四、超R反馈问题（10w+）', showAmount: true, showStatus: false, badge: 'warning' },
        { key: 'pre_churn', title: '五、预流失报备', showAmount: false, showStatus: false, badge: '' },
        { key: 'pre_complaint', title: '六、预投诉报备', showAmount: false, showStatus: true, badge: 'danger' },
    ];

    defs.forEach(function(def) {
        var tickets = sections[def.key] || [];
        container.innerHTML += buildSection(def.title, tickets, def.showAmount, def.showStatus, def.badge);
    });

    // 七、其他
    var otherData = sections.other || {};
    var otherHtml = '';
    var otherTotal = 0;
    for (var cat in otherData) {
        var tickets = otherData[cat];
        otherTotal += tickets.length;
        otherHtml += '<h4 style="color:var(--primary);margin:12px 0 6px;font-size:13px;">' + esc(cat) + ' (' + tickets.length + '条)</h4>';
        otherHtml += buildTicketTable(tickets, false, true);
    }
    container.innerHTML += '<div class="section">' +
        '<div class="section-header" onclick="toggleSection(this)">' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
        '<span class="section-title">七、其他VIP用户反馈</span>' +
        '<span class="section-badge">' + otherTotal + '</span></div>' +
        '<span class="section-arrow">&#9660;</span></div>' +
        '<div class="section-body">' + (otherHtml || '<p style="color:var(--text-muted);">无</p>') + '</div></div>';

    container.classList.remove('hidden');
}

function buildSection(title, tickets, showAmount, showStatus, badgeClass) {
    return '<div class="section">' +
        '<div class="section-header" onclick="toggleSection(this)">' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
        '<span class="section-title">' + esc(title) + '</span>' +
        '<span class="section-badge ' + badgeClass + '">' + tickets.length + '</span></div>' +
        '<span class="section-arrow">&#9660;</span></div>' +
        '<div class="section-body">' +
        (tickets.length > 0 ? buildTicketTable(tickets, showAmount, showStatus) : '<p style="color:var(--text-muted);">无</p>') +
        '</div></div>';
}

function buildTicketTable(tickets, showAmount, showStatus) {
    var cols = '<th>序号</th><th>工单号</th><th>发起人</th><th>工单内容</th><th>创建时间</th>';
    if (showAmount) cols += '<th>累充金额</th>';
    if (showStatus) cols += '<th>状态</th>';

    var rows = '';
    tickets.forEach(function(t, i) {
        var rowClass = '';
        if (showAmount && t.recharge >= 100000) rowClass = 'super-r';
        else if (showStatus && t.status === '未解决') rowClass = 'unsolved';

        var row = '<td>' + (i+1) + '</td><td>' + esc(t.id) + '</td><td>' + esc(t.creator) + '</td><td>' + esc(t.summary) + '</td><td>' + esc(t.create_time) + '</td>';
        if (showAmount) row += '<td style="font-weight:600;">' + esc(t.recharge_str) + '</td>';
        if (showStatus) {
            var cls = t.status === '已解决' ? 'resolved' : 'pending';
            row += '<td><span class="status-tag ' + cls + '">' + esc(t.status) + '</span></td>';
        }
        rows += '<tr class="' + rowClass + '">' + row + '</tr>';
    });

    return '<div style="overflow-x:auto;"><table class="ticket-table"><thead><tr>' + cols + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function toggleSection(header) {
    header.closest('.section').classList.toggle('collapsed');
}

// ========== 下载区 ==========
function renderDownloads(data) {
    var html = '';
    if (data.txt_filename) html += '<a class="btn btn-outline btn-sm" href="/download/' + data.txt_filename + '" download>TXT</a>';
    if (data.xlsx_filename) html += '<a class="btn btn-success btn-sm" href="/download/' + data.xlsx_filename + '" download>Excel</a>';
    if (data.pdf_filename) html += '<a class="btn btn-sm" style="background:#722ed1;color:#fff;" href="/download/' + data.pdf_filename + '" download>PDF</a>';
    document.getElementById('downloadBar').innerHTML = html;
    document.getElementById('downloadSection').classList.remove('hidden');
}

// ========== 历史记录 ==========
var historyPage = 1;

async function loadHistory(page) {
    historyPage = page || 1;
    try {
        var url = '/history?page=' + historyPage + '&per_page=15';
        var start = document.getElementById('historyStart').value;
        var end = document.getElementById('historyEnd').value;
        if (start) url += '&start=' + start;
        if (end) url += '&end=' + end;

        var res = await fetch(url);
        var data = await res.json();
        var files = data.files || [];
        var list = document.getElementById('historyList');

        if (files.length === 0) {
            list.innerHTML = '<li style="color:var(--text-muted);">暂无历史日报</li>';
            document.getElementById('historyPagination').innerHTML = '';
            return;
        }

        list.innerHTML = files.map(function(f) {
            var dateStr = f.date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
            var sizeKB = (f.size / 1024).toFixed(1);
            var actions = '<a href="/download/' + f.name + '" download>TXT</a>';
            if (f.has_xlsx) actions += '<a href="/download/' + f.xlsx_name + '" download>Excel</a>';
            if (f.has_pdf) actions += '<a href="/download/' + f.pdf_name + '" download>PDF</a>';
            return '<li><span class="history-date">' + dateStr + ' (' + sizeKB + ' KB)</span>' +
                '<span class="history-actions">' + actions + '</span></li>';
        }).join('');

        var pagHtml = '';
        if (data.total_pages > 1) {
            for (var p = 1; p <= data.total_pages; p++) {
                var cls = p === historyPage ? 'btn-primary' : 'btn-outline';
                pagHtml += '<button class="btn btn-sm ' + cls + '" onclick="loadHistory(' + p + ')">' + p + '</button>';
            }
        }
        document.getElementById('historyPagination').innerHTML = pagHtml;
    } catch (e) {
        document.getElementById('historyList').innerHTML = '<li style="color:var(--text-muted);">加载失败</li>';
    }
}

function clearHistoryFilter() {
    document.getElementById('historyStart').value = '';
    document.getElementById('historyEnd').value = '';
    loadHistory(1);
}

// ========== 工具 ==========
function esc(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

window.addEventListener('resize', function() {
    if (window._pieChart) window._pieChart.resize();
    if (window._barChart) window._barChart.resize();
});

loadHistory();
</script>
