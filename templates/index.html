<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP客服日报系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --bg-pattern: radial-gradient(circle at 20% 50%, rgba(47,84,150,.04) 0%, transparent 50%),
                          radial-gradient(circle at 80% 20%, rgba(99,102,241,.04) 0%, transparent 50%),
                          radial-gradient(circle at 50% 80%, rgba(236,72,153,.03) 0%, transparent 50%);
            --card-bg: rgba(255,255,255,.82);
            --card-border: rgba(255,255,255,.6);
            --card-bg-solid: #fff;
            --text: #1a1a2e;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --primary-light: #e0e7ff;
            --primary-bg: #eef2ff;
            --primary-glow: rgba(79,70,229,.15);
            --accent: #6366f1;
            --accent2: #8b5cf6;
            --success: #10b981;
            --success-bg: #ecfdf5;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fffbeb;
            --warning-light: #fef3c7;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --danger-light: #fee2e2;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
            --shadow: 0 4px 24px rgba(0,0,0,.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,.1);
            --shadow-hover: 0 12px 40px rgba(0,0,0,.12);
            --shadow-primary: 0 4px 16px rgba(79,70,229,.2);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: .25s cubic-bezier(.4,0,.2,1);
            --header-h: 72px;
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --bg-pattern: radial-gradient(circle at 20% 50%, rgba(99,102,241,.06) 0%, transparent 50%),
                          radial-gradient(circle at 80% 20%, rgba(139,92,246,.05) 0%, transparent 50%),
                          radial-gradient(circle at 50% 80%, rgba(236,72,153,.04) 0%, transparent 50%);
            --card-bg: rgba(30,30,50,.7);
            --card-border: rgba(255,255,255,.06);
            --card-bg-solid: #1e1e32;
            --text: #e8e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255,255,255,.08);
            --primary-light: rgba(99,102,241,.15);
            --primary-bg: rgba(99,102,241,.08);
            --primary-glow: rgba(99,102,241,.2);
            --success-bg: rgba(16,185,129,.08);
            --success-light: rgba(16,185,129,.15);
            --warning-bg: rgba(245,158,11,.08);
            --warning-light: rgba(245,158,11,.15);
            --danger-bg: rgba(239,68,68,.08);
            --danger-light: rgba(239,68,68,.15);
            --shadow-sm: 0 1px 2px rgba(0,0,0,.2);
            --shadow: 0 4px 24px rgba(0,0,0,.2);
            --shadow-lg: 0 8px 32px rgba(0,0,0,.3);
            --shadow-hover: 0 12px 40px rgba(0,0,0,.35);
            --shadow-primary: 0 4px 16px rgba(99,102,241,.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--bg-pattern);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== Header ===== */
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
            color: #fff;
            padding: 0 40px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(79,70,229,.25);
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
        }
        .header-brand { display: flex; align-items: center; gap: 14px; }
        .header-logo {
            width: 42px; height: 42px;
            background: rgba(255,255,255,.18);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.2);
        }
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
        .header .subtitle {
            font-size: 12px;
            opacity: .7;
            margin-top: 1px;
            font-weight: 400;
            letter-spacing: .3px;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }

        .theme-toggle {
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.18);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; gap: 6px;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,.22);
            transform: translateY(-1px);
        }

        /* ===== Layout ===== */
        .container {
            max-width: 1240px;
            margin: 28px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* ===== Cards ===== */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 28px;
            margin-bottom: 20px;
            transition: all var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-hover); }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -.2px;
        }
        .card-title::before {
            content: '';
            width: 4px; height: 18px;
            background: linear-gradient(180deg, var(--primary), var(--accent2));
            border-radius: 2px;
        }

        /* ===== Controls ===== */
        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .controls label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .controls input[type="date"] {
            padding: 9px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 13px;
            outline: none;
            background: var(--card-bg-solid);
            color: var(--text);
            transition: all var(--transition);
            font-weight: 500;
        }
        .controls input[type="date"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* ===== Buttons ===== */
        .btn {
            padding: 9px 22px;
            border: none;
            border-radius: var(--radius-xs);
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: .2px;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,.1) 0%, transparent 100%);
            pointer-events: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            box-shadow: var(--shadow-primary);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(79,70,229,.3);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled {
            background: #a0a8c0;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 4px 12px rgba(16,185,129,.2);
        }
        .btn-success:hover { transform: translateY(-1px); }
        .btn-outline {
            background: var(--card-bg-solid);
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary-bg);
            transform: translateY(-1px);
        }
        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: var(--radius-xs); }

        /* ===== Stats Grid ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 22px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .stat-card:nth-child(1)::before { background: linear-gradient(90deg, #4f46e5, #6366f1); }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .stat-card:nth-child(3)::before { background: linear-gradient(90deg, #06b6d4, #22d3ee); }
        .stat-card:nth-child(4)::before { background: linear-gradient(90deg, #ef4444, #f87171); }
        .stat-card:nth-child(5)::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .stat-card:nth-child(6)::before { background: linear-gradient(90deg, #ec4899, #f472b6); }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        .stat-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            margin: 0 auto 12px;
        }
        .stat-card:nth-child(1) .stat-icon { background: linear-gradient(135deg, rgba(79,70,229,.12), rgba(99,102,241,.08)); }
        .stat-card:nth-child(2) .stat-icon { background: linear-gradient(135deg, rgba(245,158,11,.12), rgba(251,191,36,.08)); }
        .stat-card:nth-child(3) .stat-icon { background: linear-gradient(135deg, rgba(6,182,212,.12), rgba(34,211,238,.08)); }
        .stat-card:nth-child(4) .stat-icon { background: linear-gradient(135deg, rgba(239,68,68,.12), rgba(248,113,113,.08)); }
        .stat-card:nth-child(5) .stat-icon { background: linear-gradient(135deg, rgba(139,92,246,.12), rgba(167,139,250,.08)); }
        .stat-card:nth-child(6) .stat-icon { background: linear-gradient(135deg, rgba(236,72,153,.12), rgba(244,114,182,.08)); }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: .3px;
            text-transform: uppercase;
        }
        .stat-trend { font-size: 12px; margin-top: 8px; font-weight: 600; }
        .trend-up { color: var(--danger); }
        .trend-down { color: var(--success); }
        .trend-flat { color: var(--text-muted); }

        /* ===== Charts ===== */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            min-height: 340px;
            transition: all var(--transition);
        }
        .chart-box:hover { box-shadow: var(--shadow-hover); }

        /* ===== Sections ===== */
        .section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            overflow: hidden;
            transition: all var(--transition);
        }
        .section:hover { box-shadow: var(--shadow-hover); }
        .section-header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: background var(--transition);
        }
        .section-header:hover { background: var(--primary-bg); }
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -.2px;
        }
        .section-badge {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(79,70,229,.2);
        }
        .section-badge.warning {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            box-shadow: 0 2px 8px rgba(245,158,11,.2);
        }
        .section-badge.danger {
            background: linear-gradient(135deg, #ef4444, #f87171);
            box-shadow: 0 2px 8px rgba(239,68,68,.2);
        }
        .section-arrow {
            transition: transform var(--transition);
            color: var(--text-muted);
            font-size: 12px;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            background: var(--primary-bg);
        }
        .section.collapsed .section-arrow { transform: rotate(-90deg); }
        .section-body {
            padding: 0 24px 20px;
            overflow: hidden;
            transition: max-height .35s ease, padding .35s ease;
        }
        .section.collapsed .section-body { max-height: 0; padding: 0 24px; }

        /* ===== Tables ===== */
        .ticket-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 12px;
        }
        .ticket-table th {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            letter-spacing: .3px;
            font-size: 11px;
            text-transform: uppercase;
        }
        .ticket-table th:first-child { border-radius: var(--radius-xs) 0 0 0; }
        .ticket-table th:last-child { border-radius: 0 var(--radius-xs) 0 0; }
        .ticket-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            transition: background var(--transition);
        }
        .ticket-table tbody tr { transition: all var(--transition); }
        .ticket-table tbody tr:hover td { background: var(--primary-bg); }
        .ticket-table tbody tr:last-child td { border-bottom: none; }
        .ticket-table .super-r { background: var(--danger-bg); }
        .ticket-table .unsolved { background: var(--warning-bg); }

        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-tag.resolved { background: var(--success-light); color: #059669; }
        .status-tag.pending { background: var(--warning-light); color: #d97706; }

        /* ===== Downloads ===== */
        .download-bar { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

        /* ===== History ===== */
        .history-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .history-list { list-style: none; }
        .history-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 4px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            transition: background var(--transition);
            border-radius: var(--radius-xs);
        }
        .history-list li:hover { background: var(--primary-bg); }
        .history-list li:last-child { border-bottom: none; }
        .history-date {
            color: var(--text-secondary);
            font-weight: 500;
        }
        .history-actions { display: flex; gap: 8px; }
        .history-actions a {
            color: var(--primary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border: 1.5px solid var(--primary);
            border-radius: 20px;
            transition: all var(--transition);
        }
        .history-actions a:hover {
            background: var(--primary);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: var(--shadow-primary);
        }

        /* ===== Loading & Progress ===== */
        .loading {
            display: none;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
        }
        .loading.active { display: flex; }
        .spinner {
            width: 20px; height: 20px;
            border: 2.5px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .progress-wrapper {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
            width: 100%;
        }
        .progress-wrapper.active { display: flex; }
        .progress-bar-outer {
            width: 100%;
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #8b5cf6, #a855f7);
            border-radius: 5px;
            width: 0%;
            transition: width .5s ease;
            position: relative;
        }
        .progress-bar-inner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.35) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 1.5s ease infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        .progress-desc { color: var(--text-secondary); font-weight: 500; }
        .progress-percent { color: var(--primary); font-weight: 700; }

        /* ===== Toast ===== */
        .toast {
            position: fixed; top: 20px; right: 20px;
            padding: 12px 22px;
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform .35s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 8px 24px rgba(0,0,0,.15);
            backdrop-filter: blur(12px);
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast.success { background: linear-gradient(135deg, #10b981, #059669); }

        .alert-bar {
            background: var(--danger-bg);
            border: 1.5px solid rgba(239,68,68,.3);
            border-radius: var(--radius-sm);
            padding: 12px 18px;
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--danger);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-bar::before { content: '⚠'; font-size: 16px; }

        .hidden { display: none !important; }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* ===== Animations ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp .4s ease both; }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .header { padding: 0 16px; height: 60px; }
            .header h1 { font-size: 16px; }
            .header-logo { width: 34px; height: 34px; font-size: 16px; border-radius: 8px; }
            .container { padding: 0 10px; margin: 14px auto; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .stat-card { padding: 14px 10px; }
            .stat-value { font-size: 24px; }
            .stat-icon { width: 36px; height: 36px; font-size: 16px; margin-bottom: 8px; }
            .charts-grid { grid-template-columns: 1fr; }
            .chart-box { min-height: 280px; }
            .controls { flex-direction: column; align-items: stretch; }
            .controls .btn { width: 100%; justify-content: center; }
            .ticket-table { font-size: 11px; }
            .ticket-table th, .ticket-table td { padding: 8px 6px; }
            .card { padding: 16px 14px; border-radius: var(--radius-sm); }
            .section-header { padding: 12px 16px; }
            .section-body { padding: 0 16px 14px; }
            .history-list li { flex-direction: column; gap: 8px; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-brand">
        <div class="header-logo">&#9878;</div>
        <div>
            <h1>VIP客服日报系统</h1>
            <div class="subtitle">自动生成标准化客诉日报</div>
        </div>
    </div>
    <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()">
            <span id="themeIcon">&#9790;</span>
            <span id="themeLabel">深色模式</span>
        </button>
    </div>
</div>

<div class="container">
    <!-- 操作卡片 -->
    <div class="card animate-in">
        <div class="card-title">生成日报</div>
        <div class="controls">
            <label>选择日期：</label>
            <input type="date" id="reportDate" value="{{ today }}">
            <button class="btn btn-primary" id="btnGenerate" onclick="generateReport()">&#9889; 生成日报</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span id="loadingText">正在生成日报，请耐心等待...</span>
            </div>
        </div>
        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progressBar"></div>
            </div>
            <div class="progress-info">
                <span class="progress-desc" id="progressDesc">准备中...</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
        </div>
    </div>

    <!-- 错误提示 -->
    <div class="alert-bar hidden" id="alertBar"></div>

    <!-- 统计概览 -->
    <div class="stats-grid hidden" id="statsSection">
        <div class="stat-card">
            <div class="stat-icon">&#128203;</div>
            <div class="stat-value" id="statDaily">0</div>
            <div class="stat-label">当日工单数</div>
            <div class="stat-trend" id="trendDaily"></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">&#9200;</div>
            <div class="stat-value" id="statPending">0</div>
            <div class="stat-label">待跟进工单</div>
            <div class="stat-trend" id="trendPending"></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">&#128172;</div>
            <div class="stat-value" id="statSessions">0</div>
            <div class="stat-label">总会话量</div>
            <div class="stat-trend" id="trendSessions"></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">&#128293;</div>
            <div class="stat-value" id="statSuperR">0</div>
            <div class="stat-label">超R工单</div>
            <div class="stat-trend" id="trendSuperR"></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">&#128680;</div>
            <div class="stat-value" id="statChurn">0</div>
            <div class="stat-label">预流失</div>
            <div class="stat-trend" id="trendChurn"></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">&#9888;</div>
            <div class="stat-value" id="statComplaint">0</div>
            <div class="stat-label">预投诉</div>
            <div class="stat-trend" id="trendComplaint"></div>
        </div>
    </div>

    <!-- 图表 -->
    <div class="charts-grid hidden" id="chartsSection">
        <div class="chart-box"><div id="chartPie" style="width:100%;height:310px;"></div></div>
        <div class="chart-box"><div id="chartBar" style="width:100%;height:310px;"></div></div>
    </div>

    <!-- 日报板块 -->
    <div id="sectionsContainer" class="hidden"></div>

    <!-- 下载区 -->
    <div class="card hidden" id="downloadSection">
        <div class="card-title">文件下载</div>
        <div class="download-bar" id="downloadBar"></div>
    </div>

    <!-- 历史记录 -->
    <div class="card">
        <div class="card-title">历史日报</div>
        <div class="history-controls">
            <label>从</label>
            <input type="date" id="historyStart">
            <label>到</label>
            <input type="date" id="historyEnd">
            <button class="btn btn-outline btn-sm" onclick="loadHistory()">筛选</button>
            <button class="btn btn-sm" style="background:var(--text-muted);color:#fff;" onclick="clearHistoryFilter()">重置</button>
        </div>
        <ul class="history-list" id="historyList">
            <li style="color:var(--text-muted);">加载中...</li>
        </ul>
        <div id="historyPagination" style="margin-top:14px;display:flex;gap:8px;justify-content:center;"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 主题切换 ==========
function toggleTheme() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? '' : 'dark');
    document.getElementById('themeLabel').textContent = isDark ? '深色模式' : '浅色模式';
    document.getElementById('themeIcon').innerHTML = isDark ? '&#9790;' : '&#9788;';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    if (window._pieChart) window._pieChart.resize();
    if (window._barChart) window._barChart.resize();
}
(function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('themeLabel').textContent = '浅色模式';
        document.getElementById('themeIcon').innerHTML = '&#9788;';
    }
})();

// ========== 趋势标记 ==========
function trendMark(current, prev) {
    if (prev === undefined || prev === null) return '';
    var diff = current - prev;
    if (diff > 0) return '<span class="trend-up">&#9650; +' + diff + '</span>';
    if (diff < 0) return '<span class="trend-down">&#9660; ' + diff + '</span>';
    return '<span class="trend-flat">&#8212; 持平</span>';
}

// ========== 进度条 ==========
function updateProgress(step, total, desc) {
    var pct = Math.round((step / total) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressPercent').textContent = pct + '%';
    document.getElementById('progressDesc').textContent = desc || ('步骤 ' + step + '/' + total);
    document.getElementById('loadingText').textContent = desc || '正在生成日报...';
}

function resetProgress() {
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressPercent').textContent = '0%';
    document.getElementById('progressDesc').textContent = '准备中...';
    document.getElementById('loadingText').textContent = '正在生成日报，请耐心等待...';
}

// ========== 生成日报 ==========
async function generateReport() {
    var dateInput = document.getElementById('reportDate');
    var btn = document.getElementById('btnGenerate');
    var loading = document.getElementById('loading');
    var progressWrapper = document.getElementById('progressWrapper');
    var date = dateInput.value;
    if (!date) { showToast('请选择日期', 'error'); return; }

    btn.disabled = true;
    loading.classList.add('active');
    progressWrapper.classList.add('active');
    resetProgress();
    hideAll();

    try {
        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 600000);
        var res = await fetch('/generate-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date: date }),
            signal: controller.signal,
        });
        clearTimeout(timeoutId);

        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var finalData = null;

        while (true) {
            var result = await reader.read();
            if (result.done) break;
            buffer += decoder.decode(result.value, { stream: true });

            var lines = buffer.split('\n');
            buffer = lines.pop();

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line.startsWith('data: ')) continue;
                try {
                    var msg = JSON.parse(line.substring(6));
                    if (msg.type === 'progress') {
                        updateProgress(msg.step, msg.total, msg.desc);
                    } else if (msg.type === 'done') {
                        finalData = msg.data;
                    }
                } catch (e) { /* skip malformed */ }
            }
        }

        // 进度条填满
        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('progressPercent').textContent = '100%';
        document.getElementById('progressDesc').textContent = '生成完毕';

        if (!finalData) { showToast('生成失败：未收到结果', 'error'); return; }
        if (!finalData.success) { showToast(finalData.error || '生成失败', 'error'); return; }

        if (finalData.errors && finalData.errors.length > 0) {
            var bar = document.getElementById('alertBar');
            bar.textContent = '数据获取不完整：' + finalData.errors.join('、') + '，日报可能缺少部分数据';
            bar.classList.remove('hidden');
        }

        renderStats(finalData);
        renderCharts(finalData);
        renderSections(finalData);
        renderDownloads(finalData);
        showToast('日报生成成功', 'success');
        loadHistory();
    } catch (e) {
        showToast('请求失败：' + e.message, 'error');
    } finally {
        btn.disabled = false;
        loading.classList.remove('active');
        setTimeout(function() { progressWrapper.classList.remove('active'); }, 1500);
    }
}

function hideAll() {
    ['alertBar','statsSection','chartsSection','sectionsContainer','downloadSection'].forEach(function(id) {
        document.getElementById(id).classList.add('hidden');
    });
}

// ========== 统计卡片 ==========
function renderStats(data) {
    var s = data.stats || {};
    var t = data.trend || {};
    document.getElementById('statDaily').textContent = s.daily_count || 0;
    document.getElementById('statPending').textContent = s.pending_count || 0;
    document.getElementById('statSessions').textContent = s.total_sessions || 0;
    document.getElementById('statSuperR').textContent = s.super_r_count || 0;
    document.getElementById('statChurn').textContent = s.pre_churn_count || 0;
    document.getElementById('statComplaint').textContent = s.pre_complaint_count || 0;
    document.getElementById('trendDaily').innerHTML = trendMark(s.daily_count, t.prev_daily_count);
    document.getElementById('trendSessions').innerHTML = trendMark(s.total_sessions, t.prev_total_sessions);
    document.getElementById('trendSuperR').innerHTML = trendMark(s.super_r_count, t.prev_super_r_count);
    document.getElementById('trendChurn').innerHTML = trendMark(s.pre_churn_count, t.prev_pre_churn_count);
    document.getElementById('trendComplaint').innerHTML = trendMark(s.pre_complaint_count, t.prev_pre_complaint_count);
    var section = document.getElementById('statsSection');
    section.classList.remove('hidden');
    section.classList.add('animate-in');
}

// ========== 图表 ==========
function renderCharts(data) {
    var chartsSection = document.getElementById('chartsSection');
    chartsSection.classList.remove('hidden');
    chartsSection.classList.add('animate-in');
    var structured = data.structured || {};
    var catStats = structured.category_stats || [];
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var textColor = isDark ? '#b0b0c0' : '#334155';
    var colors = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#ef4444','#f97316'];

    var pieEl = document.getElementById('chartPie');
    if (window._pieChart) window._pieChart.dispose();
    window._pieChart = echarts.init(pieEl);
    window._pieChart.setOption({
        title: { text: '问题类型分布', left: 'center', textStyle: { fontSize: 14, fontWeight: 700, color: textColor } },
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)', backgroundColor: isDark ? '#1e1e32' : '#fff', borderColor: 'transparent', textStyle: { color: textColor } },
        legend: { orient: 'vertical', left: 'left', top: 'middle', textStyle: { fontSize: 11, color: textColor } },
        color: colors,
        series: [{
            type: 'pie', radius: ['40%', '68%'], center: ['60%', '55%'],
            avoidLabelOverlap: true,
            itemStyle: { borderRadius: 6, borderColor: isDark ? '#1e1e32' : '#fff', borderWidth: 3 },
            label: { show: false },
            emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' },
                        itemStyle: { shadowBlur: 20, shadowColor: 'rgba(0,0,0,.15)' } },
            data: catStats.map(function(c) { return { name: c.name, value: c.total }; }),
        }],
    });

    var barEl = document.getElementById('chartBar');
    if (window._barChart) window._barChart.dispose();
    window._barChart = echarts.init(barEl);
    window._barChart.setOption({
        title: { text: '处理方分布', left: 'center', textStyle: { fontSize: 14, fontWeight: 700, color: textColor } },
        tooltip: { trigger: 'axis', backgroundColor: isDark ? '#1e1e32' : '#fff', borderColor: 'transparent', textStyle: { color: textColor } },
        legend: { data: ['客服处理', '运营/研发介入'], bottom: 0, textStyle: { color: textColor } },
        grid: { left: '3%', right: '4%', bottom: '12%', top: '18%', containLabel: true },
        xAxis: { type: 'category', data: catStats.map(function(c) { return c.name; }), axisLabel: { rotate: 30, fontSize: 10, color: textColor } },
        yAxis: { type: 'value', axisLabel: { color: textColor }, splitLine: { lineStyle: { color: isDark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)' } } },
        color: ['#6366f1', '#ef4444'],
        series: [
            { name: '客服处理', type: 'bar', stack: 'total', data: catStats.map(function(c) { return c.agent; }),
              itemStyle: { borderRadius: [0,0,0,0] } },
            { name: '运营/研发介入', type: 'bar', stack: 'total', data: catStats.map(function(c) { return c.dev; }),
              itemStyle: { borderRadius: [4,4,0,0] } },
        ],
    });
}

// ========== 板块渲染 ==========
function renderSections(data) {
    var container = document.getElementById('sectionsContainer');
    var s = data.structured || {};
    var sections = s.sections || {};
    container.innerHTML = '';

    var defs = [
        { key: 'pending_dev', title: '二、待跟进问题总计（飞鱼科技）', showAmount: false, showStatus: false, badge: '' },
        { key: 'unvisited', title: '三、客服未回访/未跟进问题总计', showAmount: false, showStatus: false, badge: '' },
        { key: 'super_r', title: '四、超R反馈问题（10w+）', showAmount: true, showStatus: false, badge: 'warning' },
        { key: 'pre_churn', title: '五、预流失报备', showAmount: false, showStatus: false, badge: '' },
        { key: 'pre_complaint', title: '六、预投诉报备', showAmount: false, showStatus: true, badge: 'danger' },
    ];

    defs.forEach(function(def) {
        var tickets = sections[def.key] || [];
        container.innerHTML += buildSection(def.title, tickets, def.showAmount, def.showStatus, def.badge);
    });

    // 七、其他
    var otherData = sections.other || {};
    var otherHtml = '';
    var otherTotal = 0;
    for (var cat in otherData) {
        var tickets = otherData[cat];
        otherTotal += tickets.length;
        otherHtml += '<h4 style="color:var(--primary);margin:14px 0 8px;font-size:13px;font-weight:700;">' + esc(cat) + ' (' + tickets.length + '条)</h4>';
        otherHtml += buildTicketTable(tickets, false, true);
    }
    container.innerHTML += '<div class="section">' +
        '<div class="section-header" onclick="toggleSection(this)">' +
        '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span class="section-title">七、其他VIP用户反馈</span>' +
        '<span class="section-badge">' + otherTotal + '</span></div>' +
        '<span class="section-arrow">&#9660;</span></div>' +
        '<div class="section-body">' + (otherHtml || '<p style="color:var(--text-muted);">无</p>') + '</div></div>';

    container.classList.remove('hidden');
    container.classList.add('animate-in');
}

function buildSection(title, tickets, showAmount, showStatus, badgeClass) {
    return '<div class="section">' +
        '<div class="section-header" onclick="toggleSection(this)">' +
        '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span class="section-title">' + esc(title) + '</span>' +
        '<span class="section-badge ' + badgeClass + '">' + tickets.length + '</span></div>' +
        '<span class="section-arrow">&#9660;</span></div>' +
        '<div class="section-body">' +
        (tickets.length > 0 ? buildTicketTable(tickets, showAmount, showStatus) : '<p style="color:var(--text-muted);">无</p>') +
        '</div></div>';
}

function buildTicketTable(tickets, showAmount, showStatus) {
    var cols = '<th>序号</th><th>更新时间</th><th>发起人</th><th>工单内容</th><th>受理人</th>';
    if (showAmount) cols += '<th>累充金额</th>';
    if (showStatus) cols += '<th>状态</th>';

    var rows = '';
    tickets.forEach(function(t, i) {
        var rowClass = '';
        if (showAmount && t.recharge >= 100000) rowClass = 'super-r';
        else if (showStatus && t.status === '未解决') rowClass = 'unsolved';

        var row = '<td>' + (i+1) + '</td><td style="white-space:nowrap;">' + esc(t.update_time) + '</td><td>' + esc(t.creator) + '</td><td style="max-width:420px;white-space:pre-wrap;word-break:break-all;">' + esc(t.summary) + '</td><td>' + esc(t.handler || '') + '</td>';
        if (showAmount) row += '<td style="font-weight:700;">' + esc(t.recharge_str) + '</td>';
        if (showStatus) {
            var cls = t.status === '已解决' ? 'resolved' : 'pending';
            row += '<td><span class="status-tag ' + cls + '">' + esc(t.status) + '</span></td>';
        }
        rows += '<tr class="' + rowClass + '">' + row + '</tr>';
    });

    return '<div style="overflow-x:auto;border-radius:var(--radius-xs);"><table class="ticket-table"><thead><tr>' + cols + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function toggleSection(header) {
    header.closest('.section').classList.toggle('collapsed');
}

// ========== 下载区 ==========
function renderDownloads(data) {
    var html = '';
    if (data.txt_filename) html += '<a class="btn btn-outline btn-sm" href="/download/' + data.txt_filename + '" download>&#128196; TXT</a>';
    if (data.xlsx_filename) html += '<a class="btn btn-success btn-sm" href="/download/' + data.xlsx_filename + '" download>&#128202; Excel</a>';
    if (data.pdf_filename) html += '<a class="btn btn-sm" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;" href="/download/' + data.pdf_filename + '" download>&#128211; PDF</a>';
    document.getElementById('downloadBar').innerHTML = html;
    var section = document.getElementById('downloadSection');
    section.classList.remove('hidden');
    section.classList.add('animate-in');
}

// ========== 历史记录 ==========
var historyPage = 1;

async function loadHistory(page) {
    historyPage = page || 1;
    try {
        var url = '/history?page=' + historyPage + '&per_page=15';
        var start = document.getElementById('historyStart').value;
        var end = document.getElementById('historyEnd').value;
        if (start) url += '&start=' + start;
        if (end) url += '&end=' + end;

        var res = await fetch(url);
        var data = await res.json();
        var files = data.files || [];
        var list = document.getElementById('historyList');

        if (files.length === 0) {
            list.innerHTML = '<li style="color:var(--text-muted);">暂无历史日报</li>';
            document.getElementById('historyPagination').innerHTML = '';
            return;
        }

        list.innerHTML = files.map(function(f) {
            var dateStr = f.date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
            var sizeKB = (f.size / 1024).toFixed(1);
            var actions = '<a href="/download/' + f.name + '" download>TXT</a>';
            if (f.has_xlsx) actions += '<a href="/download/' + f.xlsx_name + '" download>Excel</a>';
            if (f.has_pdf) actions += '<a href="/download/' + f.pdf_name + '" download>PDF</a>';
            return '<li><span class="history-date">' + dateStr + ' (' + sizeKB + ' KB)</span>' +
                '<span class="history-actions">' + actions + '</span></li>';
        }).join('');

        var pagHtml = '';
        if (data.total_pages > 1) {
            for (var p = 1; p <= data.total_pages; p++) {
                var cls = p === historyPage ? 'btn-primary' : 'btn-outline';
                pagHtml += '<button class="btn btn-sm ' + cls + '" onclick="loadHistory(' + p + ')">' + p + '</button>';
            }
        }
        document.getElementById('historyPagination').innerHTML = pagHtml;
    } catch (e) {
        document.getElementById('historyList').innerHTML = '<li style="color:var(--text-muted);">加载失败</li>';
    }
}

function clearHistoryFilter() {
    document.getElementById('historyStart').value = '';
    document.getElementById('historyEnd').value = '';
    loadHistory(1);
}

// ========== 工具 ==========
function esc(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

window.addEventListener('resize', function() {
    if (window._pieChart) window._pieChart.resize();
    if (window._barChart) window._barChart.resize();
});

loadHistory();
</script>
</body>
</html>
